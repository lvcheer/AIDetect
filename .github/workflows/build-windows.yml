name: 打包多平台版本

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ── 先删除旧 Release ──────────────────────────────────
  cleanup-release:
    runs-on: ubuntu-latest
    steps:
      - name: 删除旧 Release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true
        continue-on-error: true

  # ── 打包 models.zip（只需下载一次，两平台共用）──────────
  build-models:
    runs-on: ubuntu-latest
    needs: cleanup-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install transformers torch

      - name: 下载所有模型
        run: python download_models.py

      - name: 压缩为 models.zip
        run: zip -r models.zip models/

      - name: 上传 models.zip 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AI检测工具 多平台版"
          body: |
            ## 下载说明

            **每个系统需要下载两个文件：**

            | 文件 | 说明 |
            |------|------|
            | `AI检测工具-Windows.exe` | Windows 程序本体 |
            | `AI检测工具-mac.zip` | macOS 程序本体 |
            | `models.zip` | AI模型文件（**Windows 和 macOS 通用**，只需下载一次） |

            ## 安装步骤

            **Windows 用户：**
            1. 下载 `AI检测工具-Windows.exe` 和 `models.zip`
            2. 新建一个文件夹（如桌面上的"AI检测工具"），把 .exe 放进去
            3. 解压 `models.zip`，将解压出的 `models` 文件夹也放进同一个文件夹
            4. 双击 .exe 运行，结构如下：
            ```
            AI检测工具/
            ├── AI检测工具-Windows.exe
            └── models/
            ```

            **macOS 用户：**
            1. 下载 `AI检测工具-mac.zip` 和 `models.zip`
            2. 新建一个文件夹，解压 `AI检测工具-mac.zip`，得到 `AI检测工具-mac.app`
            3. 解压 `models.zip`，将 `models` 文件夹放在 .app 同级目录
            4. 双击 .app 运行，结构如下：
            ```
            AI检测工具/
            ├── AI检测工具-mac.app
            └── models/
            ```

            > 所有检测完全本地运行，文字不会上传到任何服务器。
          files: models.zip
          prerelease: false

  # ── Windows 构建 ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-models
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pandas matplotlib pyinstaller

      - name: 打包为 .exe（不含模型）
        run: |
          pyinstaller --onefile --windowed --name "AI检测工具-Windows" MainCode.py
        env:
          PYTHONUTF8: "1"

      - name: 上传 Windows .exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/AI检测工具-Windows.exe
          prerelease: false

  # ── macOS 构建 ────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: build-models
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install torch transformers pandas matplotlib pyinstaller

      - name: 打包为 .app（不含模型）
        run: |
          pyinstaller --windowed --name "AI检测工具-mac" MainCode.py

      - name: 压缩 .app 为 zip
        run: |
          cd dist
          zip -r "AI检测工具-mac.zip" "AI检测工具-mac.app"

      - name: 上传 macOS .zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/AI检测工具-mac.zip
          prerelease: false
