name: 打包 Windows .exe

on:
  # 手动触发
  workflow_dispatch:
  # 或者每次推送 main 分支自动触发
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pandas matplotlib pyinstaller

      - name: 打包为 .exe
        run: |
          pyinstaller --onefile --windowed --name "AI检测工具" MainCode.py

      - name: 上传 .exe 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AI检测工具 Windows版"
          body: |
            ## 使用说明
            1. 下载 `AI检测工具.exe`，双击运行
            2. **首次运行需要联网**，程序会自动下载AI模型（约500MB），请耐心等待
            3. 模型下载完成后，状态栏显示"模型加载完成"即可开始检测
          files: dist/AI检测工具.exe
          prerelease: false
