name: 打包 Windows .exe（含模型离线版）

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pandas matplotlib pyinstaller

      - name: 下载 AI 模型到本地
        run: python download_models.py

      - name: 打包为 .exe（含模型）
        run: |
          pyinstaller --onefile --windowed --name "AI检测工具-离线版" --add-data "models;models" MainCode.py

      - name: 上传 .exe 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AI检测工具 Windows版"
          body: |
            ## 下载说明

            | 文件 | 说明 |
            |------|------|
            | `AI检测工具-离线版.exe` | 含AI模型，**无需联网**，直接双击使用（文件较大约1.5GB） |

            ## 使用方法
            1. 下载 `AI检测工具-离线版.exe`
            2. 双击运行，等待底部状态栏显示"模型加载完成"
            3. 粘贴文字，点击"开始检测"即可
          files: dist/AI检测工具-离线版.exe
          prerelease: false
